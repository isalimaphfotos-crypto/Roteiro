<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-pale: #f5e9c8;
      --dark: #0d0d0d;
      --dark2: #1a1a1a;
      --dark3: #252525;
      --text: #e8e4dc;
      --text-muted: #9a9488;
      --border: rgba(201,168,76,0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.7;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(160deg, #1a1508 0%, var(--dark) 60%);
      border-bottom: 1px solid var(--border);
      padding: 60px 24px 50px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-badge {
      display: inline-block;
      background: rgba(201,168,76,0.12);
      border: 1px solid var(--border);
      color: var(--gold);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 22px;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.8rem);
      font-weight: 900;
      line-height: 1.1;
      color: #fff;
    }
    header h1 span { color: var(--gold); }
    .header-sub {
      margin-top: 10px;
      color: var(--text-muted);
      font-size: 14px;
      letter-spacing: 0.5px;
    }
    .header-pills {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }
    .pill {
      background: var(--dark3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 100px;
      font-weight: 500;
    }
    .pill strong { color: var(--gold); }

    /* ── CALENDAR STRIP ── */
    .cal-label {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      padding: 36px 24px 14px;
    }
    .calendar-bar {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 0 24px 32px;
    }
    .cal-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--dark3);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
    }

    /* ── MAIN LAYOUT ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    .card {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 20px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .card:hover { border-color: rgba(201,168,76,0.5); }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 24px;
      cursor: pointer;
      gap: 16px;
    }
    .card-num {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--gold);

    .card-meta { flex: 1; }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 3px 9px;
      border-radius: 100px;
      border: 1px solid;

    .tag-edu       { background: rgba(80,160,255,0.08); border-color: rgba(80,160,255,0.3); color: #50a0ff; }
    .tag-fire      { background: rgba(255,100,60,0.08); border-color: rgba(255,100,60,0.3); color: #ff643c; }
    .tag-alert     { background: rgba(255,60,60,0.08); border-color: rgba(255,60,60,0.3); color: #ff5555; }
    .tag-social    { background: rgba(80,220,140,0.08); border-color: rgba(80,220,140,0.3); color: #50dc8c; }
    .tag-phone     { background: rgba(160,80,255,0.08); border-color: rgba(160,80,255,0.3); color: #a050ff; }

    .card-chevron {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 12px;
      transition: all .25s;
    }
    .card.open .card-chevron { background: var(--gold); border-color: var(--gold); color: #000; transform: rotate(180deg); }

    /* ── BODY ── */
    .card-body {
      display: none;
      padding: 0 24px 28px;
    }
    .card.open .card-body { display: block; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 0 0 24px; }

    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .hook-box {
      background: rgba(201,168,76,0.06);
      border-left: 3px solid var(--gold);
      border-radius: 0 10px 10px 0;
      padding: 16px 18px;
      font-style: italic;
      color: var(--text);
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .script-block {
      background: var(--dark3);
      border-radius: 10px;
      padding: 18px 20px;
      font-size: 13.5px;
      color: #c8c0b4;
      line-height: 1.8;
      white-space: pre-wrap;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .script-block em {
      color: var(--text-muted);
      font-style: italic;
    }

    .cta-box {
      background: rgba(201,168,76,0.05);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 13.5px;
      line-height: 1.8;
      margin-bottom: 24px;
      color: var(--text);
    }

    .tip-box {
      background: rgba(80,160,255,0.04);
      border: 1px solid rgba(80,160,255,0.15);
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 13px;
      line-height: 1.7;
      color: #9ab8d8;

    footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 500px) {
      .card-header { padding: 18px 16px; }
      .card-body { padding: 0 16px 22px; }
    }
  </style>
</head>

// Build calendar dots
const cal = document.getElementById('cal');
roteiros.forEach((r, i) => {
  const d = document.createElement('div');
  d.className = 'cal-dot' + (i === 0 ? ' active' : '');
  d.textContent = r.num;
  d.addEventListener('click', () => {
    document.querySelectorAll('.cal-dot').forEach(x => x.classList.remove('active'));
    d.classList.add('active');
    document.getElementById('card-' + i).scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
  cal.appendChild(d);
});

// Build cards
const main = document.getElementById('roteiros');
roteiros.forEach((r, i) => {
  const tags = r.tags.map(t => `<span class="tag ${t.cls}">${t.label}</span>`).join('');
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + i;
  card.innerHTML = `
    <div class="card-header" onclick="toggle(${i})">
      <div class="card-num">${r.num}</div>
      <div class="card-meta">
        <div class="card-title">${r.title}</div>
        <div class="card-tags">${tags}</div>
      </div>
      <div class="card-chevron">▼</div>
    </div>
    <div class="card-body">
      <hr class="divider"/>
      <p class="section-label">Hook (0–3 seg)</p>
      <div class="hook-box">${r.hook}</div>
      <p class="section-label">Roteiro Completo</p>
      <div class="script-block">${r.script}</div>
      <p class="section-label">CTA Final</p>
      <div class="cta-box">${r.cta.replace(/\n/g,'<br/>')}</div>
      <p class="section-label">Dicas de Produção</p>
      <div class="tip-box">${r.tip}</div>
    </div>
  `;
  main.appendChild(card);
});

function toggle(i) {
  const card = document.getElementById('card-' + i);
  card.classList.toggle('open');
}
</script>
